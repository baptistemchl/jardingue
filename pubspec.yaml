name: jardingue
description: "Application de gestion de potager intelligente"
publish_to: "none"
version: 1.4.0+13

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.0

  # Base de données locale
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Réseau & API
  dio: ^5.8.0+1
  connectivity_plus: ^7.1.1

  # Géolocalisation
  geolocator: ^14.0.2

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Mise à jour in-app
  in_app_update: ^4.2.3

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_crashlytics: ^5.1.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0

  # Achat in-app
  in_app_purchase: ^3.2.0

  # Préférences locales
  shared_preferences: ^2.3.4

  # Liens externes (Play Store, etc.)
  url_launcher: ^6.3.1

  # Utilitaires
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_localizations:
    sdk: flutter
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.3
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  drift_dev: ^2.26.0

  # App icon generation
  flutter_launcher_icons: ^0.14.4

  # Native splash generation
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true


flutter_native_splash:
  color: "#F3EDE6"
  image: "assets/splash/splash.png"
  fullscreen: true

  android_12:
    color: "#F3EDE6"
    image: "assets/splash/splash_android12.png"
    icon_background_color: "#F3EDE6"




flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/icon/
    - assets/splash/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
